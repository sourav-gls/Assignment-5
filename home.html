<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker|Home</title>

     <!-- tailwind and daisyUI -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icons -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <header >
        <nav class="container space-y-3 sm:flex justify-between mx-auto p-5 sm:pl-0 sm:pr-0 items-center border-b-gray-200">
        <div class="flex gap-2 justify-center ">
           <img src="./assets - Copy/github-logo.png" class="h-[38px]" alt="">
           <h3 class="text-[26px] font-semibold ">GitHub Issues Tracker</h3>
        </div>
        <div class="flex gap-2">
         <label class="input">
         <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
         <g
         stroke-linejoin="round"
         stroke-linecap="round"
         stroke-width="2.5"
         fill="none"
           stroke="currentColor"
         >
         <circle cx="11" cy="11" r="8"></circle>
         <path d="m21 21-4.3-4.3"></path>
         </g>
        </svg>
        <input type="search" required placeholder="Search issues..." />
        </label>
        <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
        </div>
        </nav>
</header>
<main class="bg-base-200 pt-5 sm:pt-15">
    <section class="w-5/7 mx-auto">
       <div class="bg-white border border-red-500 p-5 rounded-md space-x-2 mb-4">
        <button class="btn btn-primary">All</button>
        <button class="btn">Open</button>
        <button class="btn">Closed</button>
       </div>
    </section>
    <section class="w-5/7 mx-auto">
      <div class="  sm:flex justify-between bg-white border border-red-500 p-2 sm:p-5 rounded-md  ">
        <div class="flex gap-3 items-center">
        <div class="bg-purple-200 p-2 rounded-full">
        <img src="./assets - Copy/Aperture.png"  alt="">
        </div>
        
        <div>
            <h2 class="font-semibold text-[20px]"> <span >0</span> Issues</h2>
            <p class="text-[#64748B]">Track and manage your project issues</p>
        </div>
        </div>
    
        <div class="flex items-center gap-1  ">
            <p><div class="w-3 h-3 bg-green-500 rounded-full"></div>&nbsp;Open</p>
            <p><div class="w-3 h-3 bg-purple-500 rounded-full"></div>&nbsp;Closed</p>
        </div>
     
      </div>

    </section>
    <section id="card-container" class="grid grid-cols-1 sm:grid-cols-3 xl:grid-cols-4 gap-3 w-5/7 mx-auto p-6 bg-white shadow-lg" >
      
    </section>
</main>


<script src="./home.js"></script>
</body>
</html>
