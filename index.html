<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker|Login</title>

    <!-- tailwind and daisyUI -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icons -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />



</head>
<body class="bg-base-400 h-[100vh] max-w-md mx-auto  ">
  <section class=" bg-white shadow-2xl pb-8 pt-8 sm:mt-12.5  rounded-md">
    <div class="flex flex-col justify-center items-center ">
        <img src="./assets - Copy/github-logo.png" alt="">
        <h1 class="text-[25px] font-semibold mt-3">GitHub Issues Tracker</h1>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
    </div>
    <div class="">
    
        <fieldset class="fieldset  w-11/12 mx-auto ">
          <label class="label text-neutral font-semibold text-[18px]">Username</label>
          <input type="text" id="username-input" maxlength="5" minlength="5" class="input  bg-base-200 w-full" placeholder="Enter Username" />
           <p class="text-primary mb-1">Default: admin</p>
          

          <label class="label text-neutral font-semibold text-[18px]" id="">Password</label>
          <input id="password-input" type="password" class="input  bg-base-200 w-full" placeholder="Enter Password" />
           <p class="text-primary">Default: admin123</p>
          <button id="sign-in-btn" class="btn btn-primary  mt-2 mb-3 w-full ">Sign In</button>
        </fieldset>

      </div >
      <div class="flex items-center w-11/12 mx-auto "> 
        <div class="flex-1 border-t border-[#00A96E]"></div>
        <span class="px-3 text-gray-500">OR</span>
        <div class="flex-1 border-t border-[#00A96E]"></div>


      </div>
      <div class="">
        <p class=" text-gray-500 text-center mt-5 mb-3">Demo Credentials:</p>
        <div class="bg-base-200 w-11/12 rounded-lg mx-auto text-center pt-5 pb-5 mb-8 ">
            <p><span class="font-semibold">Username</span>: admin</p>
            <p><span class="font-semibold">Password</span>: admin123</p>
        </div>
        
      </div>



  </section>

  <script src="login.js"></script>
    
</body>
</html>
